# Server Configuration
server.port=${PORT:8080}

# Database Configuration (MongoDB)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/devportfolio}

# Security / JWT Configuration
# Set JWT_SECRET env var in your .env (local) or Render dashboard (production).
# Must be a 256-bit (64 hex char) base64 secret. Generate one with:
#   openssl rand -hex 32
devportfolio.jwt.secret=${JWT_SECRET}
devportfolio.jwt.expirationMs=86400000

# GitHub Integration Configuration
# These are mapped to environment variables or local fallback.
devportfolio.github.clientId=${GITHUB_CLIENT_ID:placeholder-client-id}
devportfolio.github.clientSecret=${GITHUB_CLIENT_SECRET:placeholder-client-secret}

# Gemini AI API Configuration
devportfolio.gemini.apiKey=${GEMINI_API_KEY:mock-mode-key}
devportfolio.gemini.apiUrl=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# CORS Configuration
devportfolio.cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.devportfolio=DEBUG
